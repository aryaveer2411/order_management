services:
  - type: web
    name: order-management-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    # Secondary safety net: if a deploy is somehow triggered directly
    # (e.g. manual deploy), tests run before the new version goes live.
    preDeployCommand: pip install pytest httpx && pytest tests/ -q
    autoDeploy: false   # Deploys are triggered by GitHub Actions, not Render
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
